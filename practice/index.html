<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Practice</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
  --bg: #f0f4ff; --card: #fff; --primary: #6366f1; --primary-light: #e0e7ff;
  --success: #22c55e; --success-light: #dcfce7; --error: #ef4444; --error-light: #fee2e2;
  --warning: #f59e0b; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
  --gray-500: #6b7280; --gray-700: #374151; --gray-900: #111827;
  --radius: 12px; --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--gray-900); min-height: 100vh; }

.container { max-width: 800px; margin: 0 auto; padding: 16px; }

/* Header */
.app-header { background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; padding: 20px; text-align: center; }
.app-header h1 { font-size: 1.5rem; }
.app-header .sub { opacity: 0.8; font-size: 0.85rem; margin-top: 4px; }
.header-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: rgba(255,255,255,0.1); margin-top: 12px; border-radius: 8px; font-size: 0.85rem; }

/* Views */
.view { display: none; }
.view.active { display: block; }

/* Login */
.login-card { background: var(--card); border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); text-align: center; margin-top: 40px; }
.login-card h2 { margin-bottom: 16px; }
.login-card input { padding: 10px 16px; border: 2px solid var(--gray-200); border-radius: 8px; font-size: 1rem; width: 100%; max-width: 300px; text-align: center; }
.login-card input:focus { border-color: var(--primary); outline: none; }
.login-card .btn { margin-top: 16px; }
.student-list { margin-top: 16px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.student-chip { padding: 6px 16px; background: var(--primary-light); color: var(--primary); border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: 600; border: none; }
.student-chip:hover { background: var(--primary); color: white; }

/* Buttons */
.btn { padding: 10px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn:hover { filter: brightness(1.1); }
.btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
.btn-sm { padding: 6px 14px; font-size: 0.8rem; }
.btn-success { background: var(--success); }
.btn-error { background: var(--error); }

/* Topic grid */
.topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top: 16px; }
.topic-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.topic-card:hover { border-color: var(--primary); transform: translateY(-2px); }
.topic-card h3 { font-size: 0.9rem; margin-bottom: 4px; }
.topic-card .meta { font-size: 0.75rem; color: var(--gray-500); }
.topic-card .counts { display: flex; gap: 8px; margin-top: 8px; }
.topic-card .count-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: var(--gray-100); color: var(--gray-700); }
.sem-label { font-size: 0.8rem; font-weight: 600; color: var(--gray-500); margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 1px; }

/* Mode select */
.mode-select { display: flex; gap: 12px; margin-top: 16px; }
.mode-card { flex: 1; background: var(--card); border-radius: var(--radius); padding: 24px; text-align: center; cursor: pointer; box-shadow: var(--shadow); border: 2px solid transparent; transition: all 0.15s; }
.mode-card:hover { border-color: var(--primary); }
.mode-card .icon { font-size: 2rem; margin-bottom: 8px; }
.mode-card h3 { font-size: 1rem; }
.mode-card p { font-size: 0.8rem; color: var(--gray-500); margin-top: 4px; }

/* Quiz */
.quiz-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.quiz-progress .bar { flex: 1; height: 6px; background: var(--gray-200); border-radius: 3px; overflow: hidden; }
.quiz-progress .fill { height: 100%; background: var(--primary); transition: width 0.3s; }
.quiz-progress .label { font-size: 0.8rem; color: var(--gray-500); white-space: nowrap; }

.question-card { background: var(--card); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 16px; }
.question-card .q-num { font-size: 0.75rem; color: var(--primary); font-weight: 600; margin-bottom: 8px; }
.question-card .q-text { font-size: 1.05rem; line-height: 1.7; margin-bottom: 16px; }

/* MCQ options */
.mcq-options { display: flex; flex-direction: column; gap: 8px; }
.mcq-opt { padding: 12px 16px; border: 2px solid var(--gray-200); border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: all 0.15s; display: flex; align-items: center; gap: 10px; }
.mcq-opt:hover { border-color: var(--primary); background: var(--primary-light); }
.mcq-opt .letter { width: 28px; height: 28px; border-radius: 50%; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
.mcq-opt.selected { border-color: var(--primary); background: var(--primary-light); }
.mcq-opt.correct { border-color: var(--success); background: var(--success-light); }
.mcq-opt.correct .letter { background: var(--success); color: white; }
.mcq-opt.wrong { border-color: var(--error); background: var(--error-light); }
.mcq-opt.disabled { pointer-events: none; opacity: 0.7; }

/* Feedback */
.feedback { padding: 16px; border-radius: 8px; margin-top: 12px; font-size: 0.9rem; line-height: 1.6; }
.feedback.correct { background: var(--success-light); border: 1px solid var(--success); }
.feedback.wrong { background: var(--error-light); border: 1px solid var(--error); }
.feedback.partial { background: #fef3c7; border: 1px solid var(--warning); }

/* Input mode toggle */
.input-toggle { display: flex; gap: 4px; background: var(--gray-100); padding: 4px; border-radius: 8px; width: fit-content; margin-bottom: 12px; }
.input-toggle button { padding: 6px 16px; border: none; background: transparent; cursor: pointer; border-radius: 6px; font-size: 0.85rem; font-weight: 500; color: var(--gray-500); }
.input-toggle button.active { background: var(--card); color: var(--primary); box-shadow: var(--shadow); }

/* MathLive container */
.mathlive-container { margin-bottom: 12px; }
.mathlive-container math-field {
  width: 100%; font-size: 1.2rem; padding: 12px;
  border: 2px solid var(--gray-200); border-radius: 8px;
  --caret-color: var(--primary);
}
.mathlive-container math-field:focus-within { border-color: var(--primary); }
.math-toolbar { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
.math-toolbar button { padding: 6px 10px; border: 1px solid var(--gray-200); background: var(--card); border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
.math-toolbar button:hover { background: var(--primary-light); }

/* Canvas */
.canvas-container { position: relative; margin-bottom: 12px; }
.canvas-container canvas { width: 100%; height: 200px; border: 2px solid var(--gray-200); border-radius: 8px; background: white; cursor: crosshair; touch-action: none; }
.canvas-actions { display: flex; gap: 8px; margin-top: 8px; }

/* Results */
.results-card { background: var(--card); border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); text-align: center; }
.results-card .score { font-size: 3rem; font-weight: 800; color: var(--primary); }
.results-card .label { font-size: 1rem; color: var(--gray-500); margin-top: 4px; }
.results-actions { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }

/* Progress */
.progress-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 16px; }
.progress-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
.progress-card h4 { font-size: 0.85rem; margin-bottom: 8px; }
.progress-bar-sm { height: 6px; background: var(--gray-200); border-radius: 3px; overflow: hidden; }
.progress-bar-sm .fill { height: 100%; background: var(--success); }
.progress-stat { font-size: 0.75rem; color: var(--gray-500); margin-top: 4px; }

/* Nav */
.nav-back { display: inline-flex; align-items: center; gap: 4px; color: var(--gray-500); font-size: 0.85rem; cursor: pointer; margin-bottom: 12px; background: none; border: none; }
.nav-back:hover { color: var(--primary); }
</style>
</head>
<body>

<div class="app-header">
  <h1>Math Practice</h1>
  <div class="sub">Sec 1 Express Mathematics</div>
  <div class="header-bar" id="headerBar" style="display:none">
    <span id="studentName"></span>
    <span id="headerStats"></span>
  </div>
</div>

<div class="container">
  <!-- LOGIN -->
  <div class="view active" id="loginView">
    <div class="login-card">
      <h2>Who's practising?</h2>
      <input type="text" id="nameInput" placeholder="Enter your name" onkeydown="if(event.key==='Enter')loginStudent()">
      <br><button class="btn" onclick="loginStudent()">Start</button>
      <div class="student-list" id="existingStudents"></div>
    </div>
  </div>

  <!-- TOPICS -->
  <div class="view" id="topicsView">
    <button class="nav-back" onclick="showProgress()">My Progress</button>
    <h2>Choose a Topic</h2>
    <div id="topicsList"></div>
  </div>

  <!-- MODE SELECT -->
  <div class="view" id="modeView">
    <button class="nav-back" onclick="showView('topicsView')">Back to Topics</button>
    <h2 id="modeTopicTitle"></h2>
    <div class="mode-select">
      <div class="mode-card" onclick="startMCQ()">
        <div class="icon">&#9745;</div>
        <h3>MCQ Practice</h3>
        <p id="mcqCount">0 questions</p>
      </div>
      <div class="mode-card" onclick="startExam()">
        <div class="icon">&#9998;</div>
        <h3>Exam Practice</h3>
        <p id="examCount">0 questions</p>
      </div>
    </div>
  </div>

  <!-- MCQ QUIZ -->
  <div class="view" id="mcqView">
    <button class="nav-back" onclick="confirmExit()">Exit Quiz</button>
    <div class="quiz-progress">
      <span class="label" id="mcqProgressLabel">1/10</span>
      <div class="bar"><div class="fill" id="mcqProgressFill"></div></div>
      <span class="label" id="mcqScore">0 correct</span>
    </div>
    <div class="question-card">
      <div class="q-num" id="mcqQNum"></div>
      <div class="q-text" id="mcqQText"></div>
      <div class="mcq-options" id="mcqOptions"></div>
      <div id="mcqFeedback"></div>
    </div>
    <div style="text-align:center;margin-top:12px">
      <button class="btn" id="mcqNextBtn" style="display:none" onclick="nextMCQ()">Next Question</button>
    </div>
  </div>

  <!-- EXAM PRACTICE -->
  <div class="view" id="examView">
    <button class="nav-back" onclick="confirmExit()">Exit</button>
    <div class="quiz-progress">
      <span class="label" id="examProgressLabel">1/5</span>
      <div class="bar"><div class="fill" id="examProgressFill"></div></div>
    </div>
    <div class="question-card">
      <div class="q-num" id="examQNum"></div>
      <div class="q-text" id="examQText"></div>

      <div class="input-toggle">
        <button class="active" onclick="setInputMode('keyboard')">Keyboard</button>
        <button onclick="setInputMode('handwriting')">Handwriting</button>
      </div>

      <!-- Keyboard input -->
      <div id="keyboardInput">
        <div class="math-toolbar">
          <button onclick="insertMath('\\frac{}{}')">&#189;</button>
          <button onclick="insertMath('^{}')">x&#178;</button>
          <button onclick="insertMath('\\sqrt{}')">&#8730;</button>
          <button onclick="insertMath('\\pi')">&#960;</button>
          <button onclick="insertMath('\\times')">&#215;</button>
          <button onclick="insertMath('\\div')">&#247;</button>
          <button onclick="insertMath('\\pm')">&#177;</button>
          <button onclick="insertMath('\\leq')">&#8804;</button>
          <button onclick="insertMath('\\geq')">&#8805;</button>
        </div>
        <div class="mathlive-container">
          <math-field id="mathField"></math-field>
        </div>
      </div>

      <!-- Handwriting input -->
      <div id="handwritingInput" style="display:none">
        <div class="canvas-container">
          <canvas id="drawCanvas" width="760" height="200"></canvas>
        </div>
        <div class="canvas-actions">
          <button class="btn btn-sm btn-outline" onclick="clearCanvas()">Clear</button>
          <button class="btn btn-sm btn-outline" onclick="undoCanvas()">Undo</button>
        </div>
        <div id="recognisedText" style="margin-top:8px;font-size:0.85rem;color:var(--gray-500)"></div>
      </div>

      <div style="text-align:center;margin-top:16px">
        <button class="btn" onclick="submitExamAnswer()">Submit Answer</button>
      </div>
      <div id="examFeedback"></div>
    </div>
    <div style="text-align:center;margin-top:12px">
      <button class="btn" id="examNextBtn" style="display:none" onclick="nextExam()">Next Question</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="view" id="resultsView">
    <div class="results-card">
      <div class="score" id="resultScore">0/10</div>
      <div class="label" id="resultLabel">Questions Correct</div>
      <div class="results-actions">
        <button class="btn btn-outline" onclick="showView('topicsView')">Back to Topics</button>
        <button class="btn" onclick="retryQuiz()">Try Again</button>
      </div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="view" id="progressView">
    <button class="nav-back" onclick="showView('topicsView')">Back to Topics</button>
    <h2>My Progress</h2>
    <div class="results-card" style="margin:16px 0">
      <div class="score" id="totalAccuracy">0%</div>
      <div class="label" id="totalAttempts">0 questions attempted</div>
    </div>
    <h3>By Topic</h3>
    <div class="progress-grid" id="progressGrid"></div>
  </div>
</div>

<!-- MathLive -->
<script src="https://unpkg.com/mathlive@0.109.0/dist/mathlive.min.js"></script>

<script>
const API = window.location.origin;
const LABELS = ['A', 'B', 'C', 'D'];

let currentStudent = null;
let topics = [];
let selectedTopic = null;
let mcqQuestions = [];
let mcqIndex = 0;
let mcqCorrect = 0;
let examQuestions = [];
let examIndex = 0;
let currentInputMode = 'keyboard';
let canvasHistory = [];
let isDrawing = false;
let lastPoint = null;

// ── Views ──────────────────────────────────────────────────

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Login ──────────────────────────────────────────────────

async function loadStudents() {
  const res = await fetch(`${API}/api/practice/students`);
  const students = await res.json();
  const el = document.getElementById('existingStudents');
  if (students.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = students.map(s =>
    `<button class="student-chip" onclick="selectStudent(${s.id}, '${s.name}')">${s.name}</button>`
  ).join('');
}

async function loginStudent() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  const res = await fetch(`${API}/api/practice/students`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name}),
  });
  const student = await res.json();
  selectStudent(student.id, student.name);
}

function selectStudent(id, name) {
  currentStudent = {id, name};
  document.getElementById('studentName').textContent = name;
  document.getElementById('headerBar').style.display = 'flex';
  loadTopics();
}

// ── Topics ─────────────────────────────────────────────────

async function loadTopics() {
  const res = await fetch(`${API}/api/practice/topics`);
  topics = await res.json();
  renderTopics();
  showView('topicsView');
}

function renderTopics() {
  const el = document.getElementById('topicsList');
  let html = '';
  for (const sem of [1, 2]) {
    const semTopics = topics.filter(t => t.semester === sem);
    html += `<div class="sem-label">Semester ${sem}</div>`;
    html += '<div class="topic-grid">';
    for (const t of semTopics) {
      html += `
        <div class="topic-card" onclick="selectTopic(${t.id})">
          <h3>Topic ${t.id}: ${t.title}</h3>
          <div class="meta">${t.description}</div>
          <div class="counts">
            <span class="count-badge">${t.mcq_count} MCQs</span>
            <span class="count-badge">${t.exam_count} Exam Qs</span>
          </div>
        </div>`;
    }
    html += '</div>';
  }
  el.innerHTML = html;
}

function selectTopic(topicId) {
  selectedTopic = topics.find(t => t.id === topicId);
  document.getElementById('modeTopicTitle').textContent = `Topic ${selectedTopic.id}: ${selectedTopic.title}`;
  document.getElementById('mcqCount').textContent = `${selectedTopic.mcq_count} questions`;
  document.getElementById('examCount').textContent = `${selectedTopic.exam_count} questions`;
  showView('modeView');
}

// ── MCQ Quiz ───────────────────────────────────────────────

async function startMCQ() {
  const res = await fetch(`${API}/api/practice/mcq?topic_id=${selectedTopic.id}&count=10`);
  mcqQuestions = await res.json();
  mcqIndex = 0;
  mcqCorrect = 0;
  showView('mcqView');
  renderMCQ();
}

function renderMCQ() {
  const q = mcqQuestions[mcqIndex];
  const total = mcqQuestions.length;
  document.getElementById('mcqProgressLabel').textContent = `${mcqIndex + 1}/${total}`;
  document.getElementById('mcqProgressFill').style.width = `${(mcqIndex / total) * 100}%`;
  document.getElementById('mcqScore').textContent = `${mcqCorrect} correct`;
  document.getElementById('mcqQNum').textContent = `Question ${mcqIndex + 1}`;
  document.getElementById('mcqQText').textContent = q.question_text;
  document.getElementById('mcqFeedback').innerHTML = '';
  document.getElementById('mcqNextBtn').style.display = 'none';

  const optsEl = document.getElementById('mcqOptions');
  optsEl.innerHTML = q.options.map((o, i) => `
    <div class="mcq-opt" onclick="selectMCQ(${i})" data-idx="${i}">
      <span class="letter">${LABELS[i]}</span>
      <span>${o}</span>
    </div>
  `).join('');
  renderMath(document.getElementById('mcqView'));
}

async function selectMCQ(idx) {
  // Disable further clicks
  document.querySelectorAll('.mcq-opt').forEach(el => el.classList.add('disabled'));

  const q = mcqQuestions[mcqIndex];
  const res = await fetch(`${API}/api/practice/check-mcq`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      student_id: currentStudent.id,
      bank_question_id: q.id,
      selected_answer: idx,
      input_mode: 'keyboard',
    }),
  });
  const result = await res.json();

  // Highlight correct/wrong
  document.querySelectorAll('.mcq-opt').forEach((el, i) => {
    if (i === result.correct_answer) el.classList.add('correct');
    if (i === idx && !result.correct) el.classList.add('wrong');
  });

  if (result.correct) mcqCorrect++;

  document.getElementById('mcqFeedback').innerHTML = `
    <div class="feedback ${result.correct ? 'correct' : 'wrong'}">
      ${result.correct ? 'Correct!' : 'Not quite.'} ${result.explanation}
    </div>`;
  renderMath(document.getElementById('mcqFeedback'));
  document.getElementById('mcqNextBtn').style.display = 'inline-block';
}

function nextMCQ() {
  mcqIndex++;
  if (mcqIndex >= mcqQuestions.length) {
    showResults(mcqCorrect, mcqQuestions.length);
  } else {
    renderMCQ();
  }
}

// ── Exam Practice ──────────────────────────────────────────

async function startExam() {
  const res = await fetch(`${API}/api/practice/exam?topic_id=${selectedTopic.id}`);
  examQuestions = await res.json();
  if (examQuestions.length === 0) {
    alert('No exam questions for this topic yet.');
    return;
  }
  examIndex = 0;
  showView('examView');
  renderExam();
}

function renderExam() {
  const q = examQuestions[examIndex];
  const total = examQuestions.length;
  document.getElementById('examProgressLabel').textContent = `${examIndex + 1}/${total}`;
  document.getElementById('examProgressFill').style.width = `${(examIndex / total) * 100}%`;
  document.getElementById('examQNum').textContent = `Q${q.question_number}${q.part ? '(' + q.part + ')' : ''} [${q.marks} mark${q.marks > 1 ? 's' : ''}]`;

  let text = '';
  if (q.stem) text += q.stem + '<br><br>';
  text += q.question_text;
  document.getElementById('examQText').innerHTML = text;

  document.getElementById('examFeedback').innerHTML = '';
  document.getElementById('examNextBtn').style.display = 'none';

  // Reset inputs
  const mf = document.getElementById('mathField');
  if (mf && mf.setValue) mf.setValue('');
  clearCanvas();
  document.getElementById('recognisedText').textContent = '';
  setInputMode('keyboard');

  renderMath(document.getElementById('examView'));
}

function setInputMode(mode) {
  currentInputMode = mode;
  document.getElementById('keyboardInput').style.display = mode === 'keyboard' ? 'block' : 'none';
  document.getElementById('handwritingInput').style.display = mode === 'handwriting' ? 'block' : 'none';
  document.querySelectorAll('.input-toggle button').forEach((b, i) =>
    b.classList.toggle('active', (mode === 'keyboard' ? i === 0 : i === 1))
  );
  if (mode === 'handwriting') initCanvas();
}

function insertMath(latex) {
  const mf = document.getElementById('mathField');
  if (mf) mf.executeCommand(['insert', latex]);
}

async function submitExamAnswer() {
  const q = examQuestions[examIndex];
  let answer = '';

  const submitBtn = document.querySelector('#examView .btn:not(#examNextBtn)');
  submitBtn.disabled = true;

  if (currentInputMode === 'keyboard') {
    const mf = document.getElementById('mathField');
    answer = mf ? mf.getValue('latex') : '';
    if (!answer.trim()) { alert('Please enter an answer'); submitBtn.disabled = false; return; }
  } else {
    // Auto-recognise handwriting before submitting (tight bounding box crop)
    submitBtn.textContent = 'Recognising handwriting...';
    const dataUrl = exportCanvasCropped();
    if (!dataUrl) { alert('Please draw your answer first'); submitBtn.disabled = false; submitBtn.textContent = 'Submit Answer'; return; }
    try {
      const recRes = await fetch(`${API}/api/practice/recognise`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({image_data: dataUrl}),
      });
      const recData = await recRes.json();
      if (recData.recognised_text) {
        answer = recData.recognised_text;
        document.getElementById('recognisedText').textContent = `Recognised: ${answer}`;
      } else {
        answer = '[could not recognise handwriting]';
        document.getElementById('recognisedText').textContent = `Recognition failed: ${recData.error || 'unknown error'}`;
      }
    } catch (e) {
      answer = '[recognition error]';
      document.getElementById('recognisedText').textContent = `Error: ${e.message}`;
    }
  }

  submitBtn.textContent = 'Marking...';

  try {
    const res = await fetch(`${API}/api/practice/check-free`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        student_id: currentStudent.id,
        exam_question_id: q.id,
        student_answer: answer,
        input_mode: currentInputMode,
      }),
    });
    const result = await res.json();

    let feedbackClass, scoreLabel;
    if (result.is_correct || result.score >= 80) {
      feedbackClass = 'correct';
      scoreLabel = 'Correct!';
    } else if (result.score >= 40) {
      feedbackClass = 'partial';
      scoreLabel = 'Partially correct';
    } else {
      feedbackClass = 'wrong';
      scoreLabel = 'Not quite right';
    }
    document.getElementById('examFeedback').innerHTML = `
      <div class="feedback ${feedbackClass}">
        <strong>${scoreLabel}</strong><br>
        ${result.feedback}<br><br>
        <strong>Model answer:</strong> ${result.correct_answer}
      </div>`;
    renderMath(document.getElementById('examFeedback'));
    document.getElementById('examNextBtn').style.display = 'inline-block';
  } catch (e) {
    document.getElementById('examFeedback').innerHTML = `<div class="feedback wrong">Error: ${e.message}</div>`;
  }

  submitBtn.textContent = 'Submit Answer';
  submitBtn.disabled = false;
}

function nextExam() {
  examIndex++;
  if (examIndex >= examQuestions.length) {
    showView('topicsView');
  } else {
    renderExam();
  }
}

// ── Canvas (Handwriting) ───────────────────────────────────

function initCanvas() {
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = 400;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#1e293b';

  canvas.onpointerdown = (e) => {
    isDrawing = true;
    lastPoint = getPoint(e, canvas);
    saveCanvasState();
  };
  canvas.onpointermove = (e) => {
    if (!isDrawing) return;
    const p = getPoint(e, canvas);
    ctx.beginPath();
    ctx.moveTo(lastPoint.x, lastPoint.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    lastPoint = p;
  };
  canvas.onpointerup = () => { isDrawing = false; };
  canvas.onpointerleave = () => { isDrawing = false; };
}

function getPoint(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height),
  };
}

function saveCanvasState() {
  const canvas = document.getElementById('drawCanvas');
  canvasHistory.push(canvas.toDataURL());
  if (canvasHistory.length > 20) canvasHistory.shift();
}

function clearCanvas() {
  const canvas = document.getElementById('drawCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  canvasHistory = [];
}

function undoCanvas() {
  if (canvasHistory.length === 0) return;
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const data = canvasHistory.pop();
  img.onload = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
  };
  img.src = data;
}

function exportCanvasCropped() {
  // Export only the drawn area with padding (like math-stylus-support's bounding box approach)
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  // Find bounding box of drawn content
  let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
  let hasContent = false;
  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < canvas.width; x++) {
      const i = (y * canvas.width + x) * 4;
      // Check if pixel is not white (drawn on)
      if (data[i] < 200 || data[i+1] < 200 || data[i+2] < 200) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
        hasContent = true;
      }
    }
  }

  if (!hasContent) return null;

  // Add padding
  const pad = 40;
  minX = Math.max(0, minX - pad);
  minY = Math.max(0, minY - pad);
  maxX = Math.min(canvas.width, maxX + pad);
  maxY = Math.min(canvas.height, maxY + pad);

  // Create cropped canvas with white background
  const cropW = maxX - minX;
  const cropH = maxY - minY;
  const cropCanvas = document.createElement('canvas');
  cropCanvas.width = cropW;
  cropCanvas.height = cropH;
  const cropCtx = cropCanvas.getContext('2d');
  cropCtx.fillStyle = 'white';
  cropCtx.fillRect(0, 0, cropW, cropH);
  cropCtx.drawImage(canvas, minX, minY, cropW, cropH, 0, 0, cropW, cropH);

  return cropCanvas.toDataURL('image/png');
}

// ── Results ────────────────────────────────────────────────

function showResults(correct, total) {
  document.getElementById('resultScore').textContent = `${correct}/${total}`;
  document.getElementById('resultLabel').textContent = `${Math.round(correct/total*100)}% correct`;
  showView('resultsView');
}

function retryQuiz() {
  startMCQ();
}

function confirmExit() {
  if (confirm('Exit the quiz?')) showView('topicsView');
}

// ── Progress ───────────────────────────────────────────────

async function showProgress() {
  const res = await fetch(`${API}/api/practice/progress/${currentStudent.id}`);
  const data = await res.json();

  document.getElementById('totalAccuracy').textContent = `${data.accuracy}%`;
  document.getElementById('totalAttempts').textContent = `${data.total_attempts} questions attempted, ${data.total_correct} correct`;

  const grid = document.getElementById('progressGrid');
  grid.innerHTML = topics.map(t => {
    const s = data.topic_stats[String(t.id)] || {total: 0, correct: 0, accuracy: 0};
    if (s.total === 0) return '';
    return `
      <div class="progress-card">
        <h4>Topic ${t.id}: ${t.title}</h4>
        <div class="progress-bar-sm"><div class="fill" style="width:${s.accuracy}%"></div></div>
        <div class="progress-stat">${s.correct}/${s.total} correct (${s.accuracy}%)</div>
      </div>`;
  }).join('');

  showView('progressView');
}

// ── Util ───────────────────────────────────────────────────

function renderMath(el) {
  renderMathInElement(el, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '$', right: '$', display: false},
    ],
    throwOnError: false,
  });
}
